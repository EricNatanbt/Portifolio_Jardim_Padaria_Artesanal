<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste API</title>
</head>
<body>
    <h1>Teste da API de Pedidos</h1>
    <button onclick="testSaveOrder()">Testar Save Order</button>
    
    <script>
        async function testSaveOrder() {
            const testData = {
                client: {
                    phone: "5583987194754",
                    name: "Eric Natan Teste",
                    address: "Rua Teste, 123",
                    cep: "58414050",
                    observation: "Teste de pedido",
                    deliveryOption: "entrega",
                    paymentMethod: "pix"
                },
                order: {
                    total: 50.00,
                    deliveryFee: 5.00,
                    paymentMethod: "pix",
                    deliveryOption: "entrega",
                    items: [
                        { id: 1, name: "Ciabatta Clássica", price: 8.50, quantity: 2 }
                    ]
                },
                items: [
                    { id: 1, name: "Ciabatta Clássica", price: 8.50, quantity: 2 }
                ]
            };
            
            try {
                const response = await fetch('/api/save-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.json();
                console.log('Resultado:', result);
                alert(`Sucesso: ${result.success}\nOrder ID: ${result.orderId}`);
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao testar API');
            }
        }
    </script>
</body>
</html>
