<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Editar Produtos</title>
    <link rel="stylesheet" href="./css/admin-common.css">
    <link rel="stylesheet" href="css/menuAdmin.css">
    <link rel="icon" type="image/png" href="../img/logos/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="admin-header">
        <div class="logo-section" style="display: flex; align-items: center; gap: 0.75rem;">
            <img src="../img/logos/Logo.png" alt="Logo" style="height: 2.5rem; width: 2.5rem;">
            <h1>Painel do Administrador</h1>
        </div>
        <div class="header-nav">
            <a href="inicioAdmin.html" class="btn-back-site">⬅ Voltar ao Início</a>
        </div>
    </header>

    <div class="admin-container">
        <div class="admin-card">
            <h2 style="margin-bottom: 1.5rem;">Pesquisar Produto</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Digite o nome do produto..." />
                <button class="btn btn-primary" id="btnSearch">Pesquisar</button>
            </div>

            <!-- Resultado da Busca -->
            <div id="productList" class="product-list"></div>
        </div>

        <div class="admin-card form-container">
            <h2 id="formTitle" style="margin-bottom: 1.5rem;">Cadastrar / Editar Produto</h2>

            <div class="form-group">
                <label>Nome do Produto</label>
                <input type="text" id="productName" placeholder="Ex: Pão de Campanha" />
            </div>

            <div class="form-group">
                <label>Preço (R$)</label>
                <input type="number" step="0.01" id="productPrice" placeholder="0,00" />
            </div>

            <div class="form-group">
                <label>Disponível?</label>
                <select id="productStatus">
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div class="form-group">
                <label>Dia Disponível</label>
                <input type="date" id="availableDate" />
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" id="btnSave">Salvar</button>
                <button class="btn btn-secondary" id="btnNew">Novo Produto</button>
                <button class="btn danger" id="btnDelete" style="background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca;">Excluir</button>
            </div>
        </div>
    </div>

    <footer style="text-align: center; padding: 2rem; color: var(--muted-foreground); font-size: 0.9rem;">
        &copy; 2026 Jardim Padaria Artesanal - Painel de Controle
    </footer>

    <div id="notificationBar" class="notification-bar"></div>
    <script src="../js/main.js"></script>
    <script src="js/menuAdmin.js"></script>
</body>

</html>
