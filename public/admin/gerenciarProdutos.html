<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerenciar Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/gerenciarProduto.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
<div class="admin-container">
    <div class="admin-header">
        <h1>Painel Administrativo</h1>
        <p>Jardim Padaria - Gerenciamento de Produtos</p>
    </div>

    <div class="products-table-container">
        <div class="table-header-actions">
            <h2 style="margin:0; color:var(--primary);">Lista de Produtos</h2>
            <button class="btn-add" id="addProductBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Novo Produto
            </button>
        </div>

        <div class="products-table">
            <table id="productsTable">
                <thead>
                    <tr>
                        <th class="td-image">Imagem</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Disponibilidade</th>
                        <th style="text-align:right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                    <tr>
                        <td colspan="6" style="text-align:center;padding:3rem;">
                            <div style="color:var(--text-light);">Carregando produtos...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="admin-footer">
        <p>&copy; 2025 Jardim Padaria Artesanal - Painel de Controle</p>
    </div>
</div>

<!-- Modal Criar Produto -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeCreateModal">&times;</span>
        <h2>Criar Novo Produto</h2>
        <form id="createForm">
            <div class="form-group">
                <label for="createNome">Nome do Produto</label>
                <input type="text" id="createNome" placeholder="Ex: Pão de Fermentação Natural" required>
            </div>
            
            <div class="form-group half">
                <label for="createPreco">Preço (R$)</label>
                <input type="number" id="createPreco" step="0.01" placeholder="0,00" required>
            </div>
            
            <div class="form-group half">
                <label for="createCategoria">Categoria</label>
                <select id="createCategoria" required>
                    <option value="">Selecione</option>
                    <option value="Pães">Pães</option>
                    <option value="Ciabattas">Ciabattas</option>
                    <option value="Focaccias">Focaccias</option>
                    <option value="Doce">Doce</option>
                    <option value="Salgados">Salgados</option>
                    <option value="Pronta-Entrega">Pronta-Entrega</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="createDescricao">Descrição</label>
                <textarea id="createDescricao" rows="3" placeholder="Descreva os detalhes do produto..." required></textarea>
            </div>
            
            <div class="form-group">
                <label>Dias de Fornada</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="createDias" value="quarta"> Quarta</label>
                    <label><input type="checkbox" name="createDias" value="quinta"> Quinta</label>
                    <label><input type="checkbox" name="createDias" value="sexta"> Sexta</label>
                    <label><input type="checkbox" name="createDias" value="sabado"> Sábado</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Foto do Produto</label>
                <div class="image-upload-container">
                    <input type="file" id="createImagem" accept="image/*">
                    <div id="createImagePreview" class="image-preview"></div>
                </div>
            </div>

            <div class="buttons">
                <button type="button" class="btn-cancel" id="cancelCreateBtn">Cancelar</button>
                <button type="submit" class="btn-add">Criar Produto</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Editar Produto -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeEditModal">&times;</span>
        <h2>Editar Produto</h2>
        <form id="editForm">
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label for="editNome">Nome do Produto</label>
                <input type="text" id="editNome" required>
            </div>
            
            <div class="form-group half">
                <label for="editPreco">Preço (R$)</label>
                <input type="number" id="editPreco" step="0.01" required>
            </div>
            
            <div class="form-group half">
                <label for="editCategoria">Categoria</label>
                <select id="editCategoria" required>
                    <option value="">Selecione</option>
                    <option value="Pães">Pães</option>
                    <option value="Ciabattas">Ciabattas</option>
                    <option value="Focaccias">Focaccias</option>
                    <option value="Doce">Doce</option>
                    <option value="Salgados">Salgados</option>
                    <option value="Pronta-Entrega">Pronta-Entrega</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="editDescricao">Descrição</label>
                <textarea id="editDescricao" rows="3" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Dias de Fornada</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="editDias" value="quarta"> Quarta</label>
                    <label><input type="checkbox" name="editDias" value="quinta"> Quinta</label>
                    <label><input type="checkbox" name="editDias" value="sexta"> Sexta</label>
                    <label><input type="checkbox" name="editDias" value="sabado"> Sábado</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Alterar Foto</label>
                <div class="image-upload-container">
                    <input type="file" id="editImagem" accept="image/*">
                    <div id="editImagePreview" class="image-preview"></div>
                </div>
            </div>

            <div class="buttons">
                <button type="button" class="btn-cancel" id="cancelEditBtn">Cancelar</button>
                <button type="submit" class="btn-add">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>

    <div id="notificationBar" class="notification-bar"></div>
    <script src="../js/main.js"></script>
    <script src="js/gerenciarProdutos.js"></script>
</body>
</html>
