
    <div class="modal-overlay" id="checkoutModalOverlay"></div>
    <div class="modal-content checkout-modal-content">
        <div class="modal-header">
            <h3>Finalizar Pedido</h3>
            <button id="closeCheckoutModal" class="close-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <form id="checkoutForm">
                <div class="checkout-form-section">
                    <div class="form-group">
                        <label for="customerName">Nome Completo:</label>
                        <input type="text" id="customerName" name="customerName" required>
                    </div>
                    <div class="form-group">
                        <label for="customerPhone">Telefone de Contato (WhatsApp):</label>
                        <input type="tel" id="customerPhone" name="customerPhone" placeholder="(XX) XXXXX-XXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="customerCep">CEP:</label>
                        <input type="text" id="customerCep" name="customerCep" placeholder="00000-000" maxlength="9" required>
                    </div>
                    <div class="form-group">
                        <label for="customerStreet">Rua/Avenida:</label>
                        <input type="text" id="customerStreet" name="customerStreet" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group address-number-group">
                            <label for="customerNumber">Número:</label>
                            <input type="text" id="customerNumber" name="customerNumber" required>
                        </div>
                        <div class="form-group">
                            <label for="customerNeighborhood">Bairro:</label>
                            <input type="text" id="customerNeighborhood" name="customerNeighborhood" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="customerComplement">Complemento (Opcional):</label>
                        <input type="text" id="customerComplement" name="customerComplement">
                    </div>
                    <div class="form-group">
                        <label for="customerCity">Cidade/Estado:</label>
                        <input type="text" id="customerCity" name="customerCity" required>
                    </div>
                </div>
                
                <div class="checkout-extra-section">
                    <div class="form-group">
                        <label for="deliveryOption">Opção de Entrega:</label>
                        <select id="deliveryOption" name="deliveryOption" required>
                            <option value="entrega">Entrega</option>
                            <option value="retirada">Retirada na Loja</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Forma de Pagamento:</label>
                        <select id="paymentMethod" name="paymentMethod" required>
                            <option value="pix">Pix</option>
                            <option value="cartao">Cartão (Débito/Crédito)</option>
                            <option value="dinheiro">Dinheiro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="customerObservation">Observação (Opcional):</label>
                        <textarea id="customerObservation" name="customerObservation" rows="3"></textarea>
                    </div>
                </div>
                
                <div class="checkout-summary-section">
                    <div class="order-summary">
                        <h4>Resumo do Pedido</h4>
                        <ul id="checkoutSummaryList">
                            <!-- Itens serão injetados aqui -->
                        </ul>
                        <div class="summary-totals">
                            <div class="summary-row">
                                <span>Subtotal:</span>
                                <span id="checkoutSubtotal">R$ 0,00</span>
                            </div>
                            <div class="summary-row" id="deliveryFeeRow" style="display: none;">
                                <span>Frete:</span>
                                <span id="checkoutDeliveryFee">R$ 0,00</span>
                            </div>
                            <div class="summary-row total">
                                <strong>Total:</strong>
                                <strong id="checkoutTotal">R$ 0,00</strong>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="checkout-submit-btn">Finalizar Pedido</button>
                </div>
            </form>
        </div>
