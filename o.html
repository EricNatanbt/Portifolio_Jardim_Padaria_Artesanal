<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido - Jardim Padaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           VARIÁVEIS DE COR E ESPAÇAMENTO
           ============================================ */
        :root {
            --primary: #1C3D2D;
            --primary-dark: #0F2620;
            --primary-light: #2A5C42;
            --secondary: #A2B28E;
            --secondary-light: #C8D4B8;
            --accent: #F5C8B0;
            --accent-light: #F9E4D4;
            --background: #FCF9F5;
            --foreground: #1C3D2D;
            --card: #FFFFFF;
            --muted: #E8F0EB;
            --muted-foreground: #5A7A6A;
            --border: #D4E8DC;
            --input: #FFFFFF;
            --success: #27AE60;
            --warning: #E67E22;
            --error: #E74C3C;
            --uber: #000000;
            --maps: #4285F4;
            
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            
            --radius: 0.65rem;
            --radius-lg: 1rem;
            --shadow: 0 4px 12px rgba(28, 61, 45, 0.08);
            --shadow-lg: 0 8px 32px rgba(28, 61, 45, 0.12);
        }

        /* ============================================
           RESET E ESTILOS GLOBAIS
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--foreground);
            line-height: 1.6;
            min-height: 100vh;
            padding: var(--spacing-sm);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--primary);
            line-height: 1.3;
        }

        /* ============================================
           CONTAINER PRINCIPAL - MOBILE FIRST
           ============================================ */
        .order-container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: containerSlideIn 0.6s ease-out;
        }

        @keyframes containerSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           HEADER DO PEDIDO - MOBILE OPTIMIZED
           ============================================ */
        .order-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: var(--spacing-xl) var(--spacing-lg);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .order-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><text x="50%" y="50%" font-family="Playfair Display" font-size="20" text-anchor="middle" dominant-baseline="middle">🍞</text></svg>');
            background-size: 60px 60px;
        }

        .order-header h1 {
            font-size: 1.8em;
            margin-bottom: var(--spacing-xs);
            color: white;
            position: relative;
            z-index: 1;
        }

        .order-header p {
            font-size: 1em;
            opacity: 0.9;
            margin-bottom: var(--spacing-md);
            position: relative;
            z-index: 1;
        }

        .order-id {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            position: relative;
            z-index: 1;
        }

        .status-badge {
            display: inline-block;
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--accent);
            color: var(--primary-dark);
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85em;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
        }

        /* ============================================
           CONTEÚDO DO PEDIDO - MOBILE FRIENDLY
           ============================================ */
        .order-content {
            padding: var(--spacing-lg);
        }

        .section {
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-md);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            transition: all 0.3s ease;
        }

        .section:hover {
            border-color: var(--primary);
        }

        .section h2 {
            color: var(--primary);
            margin-bottom: var(--spacing-md);
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        /* ============================================
           GRID DE INFORMAÇÕES - MOBILE OPTIMIZED
           ============================================ */
        .info-grid {
            display: grid;
            gap: var(--spacing-sm);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--border);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item strong {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9em;
        }

        .info-item span {
            color: var(--muted-foreground);
            font-size: 0.95em;
            line-height: 1.4;
        }

        /* ============================================
           LINKS DE ENDEREÇO - MOBILE FRIENDLY
           ============================================ */
        .address-links {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-xs);
            flex-wrap: wrap;
        }

        .address-link {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius);
            font-size: 0.8em;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid;
        }

        .address-link.maps {
            background: rgba(66, 133, 244, 0.1);
            border-color: var(--maps);
            color: var(--maps);
        }

        .address-link.uber {
            background: rgba(0, 0, 0, 0.05);
            border-color: var(--uber);
            color: var(--uber);
        }

        .address-link:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .address-link.maps:hover {
            background: var(--maps);
            color: white;
        }

        .address-link.uber:hover {
            background: var(--uber);
            color: white;
        }

        /* ============================================
           TABELA DE ITENS - MOBILE SCROLL
           ============================================ */
        .table-container {
            overflow-x: auto;
            margin-top: var(--spacing-md);
            -webkit-overflow-scrolling: touch;
        }

        .items-list {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px;
        }

        .items-list th {
            background: var(--muted);
            padding: var(--spacing-sm);
            text-align: left;
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .items-list td {
            padding: var(--spacing-sm);
            border-bottom: 1px solid var(--border);
            font-size: 0.9em;
        }

        .items-list tr:nth-child(even) {
            background: var(--background);
        }

        /* ============================================
           RESUMO DO PEDIDO
           ============================================ */
        .summary {
            background: linear-gradient(135deg, var(--muted) 0%, var(--background) 100%);
            border: 2px dashed var(--primary);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
            font-size: 1em;
        }

        .summary-item.total {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--primary);
            border-top: 2px solid var(--primary);
            margin-top: var(--spacing-sm);
            padding-top: var(--spacing-md);
        }

        /* ============================================
           BOTÕES DE AÇÃO - MOBILE FRIENDLY
           ============================================ */
        .actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-xl);
        }

        .btn {
            padding: var(--spacing-md) var(--spacing-lg);
            border: none;
            border-radius: var(--radius);
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* ============================================
           TIMESTAMP
           ============================================ */
        .timestamp {
            text-align: center;
            color: var(--muted-foreground);
            margin-top: var(--spacing-lg);
            font-style: italic;
            padding: var(--spacing-md);
            background: var(--muted);
            border-radius: var(--radius);
            border-left: 4px solid var(--primary);
            font-size: 0.9em;
        }

        /* ============================================
           DESKTOP ENHANCEMENTS
           ============================================ */
        @media (min-width: 768px) {
            body {
                padding: var(--spacing-md);
            }

            .order-container {
                max-width: 800px;
                border-radius: var(--radius-lg);
            }

            .order-header {
                padding: var(--spacing-2xl);
            }

            .order-header h1 {
                font-size: 2.5em;
            }

            .order-header p {
                font-size: 1.1em;
            }

            .order-content {
                padding: var(--spacing-2xl);
            }

            .section {
                padding: var(--spacing-lg);
                margin-bottom: var(--spacing-xl);
                border-radius: var(--radius-lg);
            }

            .section h2 {
                font-size: 1.4em;
            }

            .info-item {
                flex-direction: row;
                align-items: flex-start;
                justify-content: space-between;
            }

            .info-item span {
                text-align: right;
                flex: 1;
            }

            .address-links {
                justify-content: flex-end;
            }

            .items-list {
                min-width: auto;
            }

            .items-list th,
            .items-list td {
                padding: var(--spacing-md);
            }

            .actions {
                flex-direction: row;
                justify-content: center;
            }

            .btn {
                padding: var(--spacing-lg) var(--spacing-xl);
                min-width: 200px;
            }
        }

        @media (min-width: 1024px) {
            .order-header::before {
                background-size: 80px 80px;
            }
        }

        /* ============================================
           ESTADOS DE CARREGAMENTO
           ============================================ */
        .loading {
            opacity: 0.7;
            pointer-events: none;
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================
           TOUCH FRIENDLY STYLES
           ============================================ */
        @media (hover: none) {
            .btn:hover,
            .address-link:hover {
                transform: none;
            }
            
            .section:hover {
                border-color: var(--border);
            }
        }
    </style>
</head>
<body>
    <div class="order-container">
        <div class="order-header">
            <h1>🍞 Jardim Padaria</h1>
            <p>Comprovante de Pedido</p>
            <div class="order-id" id="orderId">Carregando...</div>
            <div class="status-badge" id="orderStatus">📋 Pedido Recebido</div>
        </div>

        <div class="order-content">
            <!-- Informações do Cliente -->
            <div class="section">
                <h2>👤 Informações do Cliente</h2>
                <div class="info-grid" id="customerInfo">
                    <!-- Será preenchido via JavaScript -->
                </div>
            </div>

            <!-- Itens do Pedido -->
            <div class="section">
                <h2>📋 Itens do Pedido</h2>
                <div class="table-container">
                    <table class="items-list" id="orderItems">
                        <!-- Será preenchido via JavaScript -->
                    </table>
                </div>
            </div>

            <!-- Resumo do Pedido -->
            <div class="section summary">
                <h2>💵 Resumo do Pedido</h2>
                <div id="orderSummary">
                    <!-- Será preenchido via JavaScript -->
                </div>
            </div>

            <!-- Timestamp -->
            <div class="timestamp" id="orderTimestamp">
                <!-- Será preenchido via JavaScript -->
            </div>

            <!-- Ações -->
            <div class="actions">
                <button class="btn btn-primary" onclick="downloadImage()">
                    📥 Baixar Comprovante
                </button>
                <a href="https://wa.me/5583999204618" class="btn btn-secondary" target="_blank">
                    📞 Falar no WhatsApp
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts necessários -->
    <script src="js/components/image-generator.js"></script>
    <script src="js/order-display-short.js"></script>
</body>
</html>
