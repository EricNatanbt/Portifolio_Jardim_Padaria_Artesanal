<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/logos/Logo.png">
    <title>Detalhes do Pedido - Jardim Padaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Estilos similares ao o.html mas otimizados para dados do banco */
        :root {
            --primary: #1C3D2D;
            --primary-dark: #0F2620;
            --primary-light: #2A5C42;
            --secondary: #A2B28E;
            --background: #FCF9F5;
            --card: #FFFFFF;
            --border: #D4E8DC;
            --success: #27AE60;
            --error: #E74C3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .order-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .order-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .order-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .order-header .order-id {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #FFA000;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .order-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--background);
        }

        .section h2 {
            color: var(--primary);
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
        }

        .info-grid {
            display: grid;
            gap: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item strong {
            color: var(--primary);
            font-weight: 600;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.1em;
        }

        .total {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary);
            border-top: 2px solid var(--primary);
            margin-top: 10px;
            padding-top: 10px;
        }

        .timestamp {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-style: italic;
            padding: 10px;
            background: var(--background);
            border-radius: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .order-container {
                margin: 10px;
            }
            
            .info-item {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="order-container">
        <div class="order-header">
            <h1>🍞 Jardim Padaria</h1>
            <p>Detalhes do Pedido</p>
            <div class="order-id" id="orderId">Carregando...</div>
            <div class="status-badge" id="orderStatus">📋 Processando</div>
        </div>

        <div class="order-content" id="orderContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Carregando detalhes do pedido...</p>
            </div>
        </div>
    </div>

    <script type="module">
        // Importa o cliente da API
        import apiClient from './js/api-client.js';

        class OrderDisplayFromDatabase {
            constructor() {
                this.orderData = null;
                this.init();
            }

            async init() {
                await this.loadOrderFromDatabase();
                this.displayOrder();
            }

            async loadOrderFromDatabase() {
                const urlParams = new URLSearchParams(window.location.search);
                const orderId = urlParams.get('orderId');
                
                if (!orderId) {
                    this.showError('Nenhum pedido especificado na URL.');
                    return;
                }

                try {
                    console.log(`📋 Buscando pedido ${orderId} do banco de dados...`);
                    
                    // Usa o apiClient para buscar o pedido
                    const response = await apiClient.getOrder(orderId);
                    
                    if (response.success && response.orderData) {
                        this.orderData = response.orderData;
                        console.log('✅ Pedido carregado do banco:', this.orderData);
                    } else {
                        this.showError(response.message || 'Pedido não encontrado no banco de dados.');
                    }
                } catch (error) {
                    console.error('❌ Erro ao carregar pedido:', error);
                    this.showError('Erro ao carregar os detalhes do pedido.');
                }
            }

            displayOrder() {
                if (!this.orderData) return;

                const orderContent = document.getElementById('orderContent');
                if (!orderContent) return;

                try {
                    const { customer, order, items } = this.orderData;
                    
                    // HTML completo do pedido
                    orderContent.innerHTML = `
                        <!-- Informações do Cliente -->
                        <div class="section">
                            <h2>👤 Informações do Cliente</h2>
                            <div class="info-grid">
                                <div class="info-item">
                                    <strong>Nome:</strong>
                                    <span>${this.escapeHtml(customer.name)}</span>
                                </div>
                                <div class="info-item">
                                    <strong>Telefone:</strong>
                                    <span>${this.formatPhone(customer.phone)}</span>
                                </div>
                                <div class="info-item">
                                    <strong>Entrega:</strong>
                                    <span>${order.delivery_option === 'retirada' ? '🛵 Retirada na Loja' : '🚗 Entrega'}</span>
                                </div>
                                <div class="info-item">
                                    <strong>Pagamento:</strong>
                                    <span>${order.payment_method === 'pix' ? '💰 Pix' : '💳 Cartão'}</span>
                                </div>
                                ${order.observation ? `
                                <div class="info-item">
                                    <strong>Observação:</strong>
                                    <span style="color: #e67e22;">${this.escapeHtml(order.observation)}</span>
                                </div>
                                ` : ''}
                                ${order.delivery_option === 'entrega' && order.address ? `
                                <div class="info-item">
                                    <strong>Endereço:</strong>
                                    <span>${this.escapeHtml(order.address)}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>

                        <!-- Itens do Pedido -->
                        <div class="section">
                            <h2>📋 Itens do Pedido</h2>
                            <div class="info-grid">
                                ${items && items.length > 0 ? items.map(item => `
                                <div class="info-item">
                                    <span>${item.quantity}x ${this.escapeHtml(item.product_name)}</span>
                                    <span>R$ ${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                                `).join('') : '<p>Nenhum item encontrado</p>'}
                            </div>
                        </div>

                        <!-- Resumo do Pedido -->
                        <div class="section">
                            <h2>💵 Resumo do Pedido</h2>
                            <div class="info-grid">
                                <div class="summary-item">
                                    <span>Subtotal:</span>
                                    <span>R$ ${(order.subtotal || 0).toFixed(2)}</span>
                                </div>
                                ${order.delivery_fee > 0 ? `
                                <div class="summary-item">
                                    <span>Frete:</span>
                                    <span>R$ ${order.delivery_fee.toFixed(2)}</span>
                                </div>
                                ` : ''}
                                <div class="summary-item total">
                                    <span>TOTAL:</span>
                                    <span>R$ ${order.total.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Timestamp -->
                        <div class="timestamp" id="orderTimestamp">
                            Pedido realizado em: ${new Date(order.created_at).toLocaleString('pt-BR')}
                        </div>

                        <!-- Informações de ID -->
                        <div class="timestamp">
                            ID do Pedido: ${order.order_id}<br>
                            Referência: ${order.id}
                        </div>
                    `;

                    // Atualiza header
                    const orderIdElement = document.getElementById('orderId');
                    if (orderIdElement) {
                        orderIdElement.textContent = `Pedido: ${order.order_id}`;
                    }

                    const statusElement = document.getElementById('orderStatus');
                    if (statusElement) {
                        statusElement.textContent = '✅ Pedido Confirmado';
                        statusElement.style.background = '#4CAF50';
                    }

                } catch (error) {
                    console.error('Erro ao exibir pedido:', error);
                    this.showError('Erro ao exibir os dados do pedido.');
                }
            }

            formatPhone(phone) {
                if (!phone) return 'Não informado';
                const cleanPhone = phone.replace(/\D/g, '');
                if (cleanPhone.length === 12) { // +55 format
                    return `(${cleanPhone.substring(2, 4)}) ${cleanPhone.substring(4, 9)}-${cleanPhone.substring(9)}`;
                } else if (cleanPhone.length === 11) {
                    return `(${cleanPhone.substring(0, 2)}) ${cleanPhone.substring(2, 7)}-${cleanPhone.substring(7)}`;
                }
                return phone;
            }

            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            showError(message) {
                const orderContent = document.getElementById('orderContent');
                if (orderContent) {
                    orderContent.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #666;">
                            <h2 style="color: #e74c3c; margin-bottom: 20px;">❌ ${message}</h2>
                            <p style="margin-bottom: 30px;">Verifique se o link do pedido está correto.</p>
                            <button onclick="window.location.href='index.html'" style="
                                padding: 12px 24px;
                                background: #1C3D2D;
                                color: white;
                                border: none;
                                border-radius: 8px;
                                cursor: pointer;
                                font-size: 1em;
                            ">
                                🏠 Voltar para a Loja
                            </button>
                        </div>
                    `;
                }
            }
        }

        // Inicializa quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            new OrderDisplayFromDatabase();
        });
    </script>
</body>
</html>
