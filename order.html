<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido - Jardim Padaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1C3D2D 0%, #2D5A3D 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .order-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .order-header {
            background: #1C3D2D;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .order-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .order-header .order-id {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .order-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .section h2 {
            color: #1C3D2D;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }

        .info-grid {
            display: grid;
            gap: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .items-list {
            width: 100%;
            border-collapse: collapse;
        }

        .items-list th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #1C3D2D;
        }

        .items-list td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .items-list tr:nth-child(even) {
            background: #f8f9fa;
        }

        .summary {
            background: #f8f9fa;
            border: 2px dashed #1C3D2D;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.1em;
        }

        .total {
            font-size: 1.3em;
            font-weight: bold;
            color: #1C3D2D;
            border-top: 2px solid #1C3D2D;
            margin-top: 10px;
            padding-top: 10px;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #1C3D2D;
            color: white;
        }

        .btn-secondary {
            background: #4CAF50;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #FFA000;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .timestamp {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .order-container {
                margin: 10px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="order-container">
        <div class="order-header">
            <h1>🍞 Jardim Padaria</h1>
            <p>Comprovante de Pedido</p>
            <div class="order-id" id="orderId">Carregando...</div>
            <div class="status-badge" id="orderStatus">📋 Pedido Recebido</div>
        </div>

        <div class="order-content">
            <!-- Informações do Cliente -->
            <div class="section">
                <h2>👤 Informações do Cliente</h2>
                <div class="info-grid" id="customerInfo">
                    <!-- Será preenchido via JavaScript -->
                </div>
            </div>

            <!-- Itens do Pedido -->
            <div class="section">
                <h2>📋 Itens do Pedido</h2>
                <table class="items-list" id="orderItems">
                    <!-- Será preenchido via JavaScript -->
                </table>
            </div>

            <!-- Resumo do Pedido -->
            <div class="section summary">
                <h2>💵 Resumo do Pedido</h2>
                <div id="orderSummary">
                    <!-- Será preenchido via JavaScript -->
                </div>
            </div>

            <!-- Timestamp -->
            <div class="timestamp" id="orderTimestamp">
                <!-- Será preenchido via JavaScript -->
            </div>

            <!-- Ações -->
            <div class="actions">
                <button class="btn btn-primary" onclick="downloadImage()">
                    📥 Baixar Comprovante
                </button>
                <a href="https://wa.me/5583999204618" class="btn btn-secondary" target="_blank">
                    📞 Falar no WhatsApp
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts necessários -->
    <script src="js/components/image-generator.js"></script>
    <script src="js/order-display.js"></script>
</body>
</html>
